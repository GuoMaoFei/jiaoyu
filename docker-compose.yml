version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: treeedu-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the sqlite DB to persist data across container restarts
      - ./backend/treeedu.db:/app/treeedu.db
      # Mount the Environment variables (APIs, DB configurations)
      - ./backend/.env:/app/.env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: treeedu-frontend
    ports:
      - "80:80"
      - "5173:80" # Allows access via 5173 to match local dev
    depends_on:
      - backend
    restart: unless-stopped
