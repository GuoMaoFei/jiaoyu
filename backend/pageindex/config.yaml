model: "minimax"

model_profiles:
  fast: "MiniMax-M2.5"
  medium: "MiniMax-M2.5"
  heavy: "MiniMax-M2.7"

task_to_profile:
  toc_detect: fast
  title_check: fast
  page_index_detect: fast
  toc_transform: medium
  node_summary: medium
  toc_generate: heavy
  toc_fix: heavy

task_params:
  toc_detect:
    temperature: 0
    max_tokens: 2000
    top_p: 1
  title_check:
    temperature: 0
    max_tokens: 2000
    top_p: 1
  page_index_detect:
    temperature: 0
    max_tokens: 2000
    top_p: 1
  toc_transform:
    temperature: 0
    max_tokens: 4000
    top_p: 1
  node_summary:
    temperature: 0.3
    max_tokens: 500
    top_p: 0.9
  toc_generate:
    temperature: 0
    max_tokens: 32000
    top_p: 1
  toc_fix:
    temperature: 0
    max_tokens: 2000
    top_p: 1

toc_check_page_num: 20
max_page_num_each_node: 10
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "yes"
if_add_doc_description: "no"
if_add_node_text: "no"
